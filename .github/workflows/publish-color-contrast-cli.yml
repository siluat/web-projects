name: Publish color-contrast-cli

on:
  push:
    tags:
      - 'color-contrast-cli/v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: packages/color-contrast-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#color-contrast-cli/v}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::package.json version ($pkg_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Verify jsr.json version
        run: |
          jsr_version=$(node -p "require('./jsr.json').version")
          if [ "$jsr_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::jsr.json version ($jsr_version) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Run static checks
        run: bun static-check
        working-directory: .

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: packages/color-contrast-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-jsr:
    name: Publish to JSR
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/color-contrast-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Publish to JSR
        run: npx jsr publish
