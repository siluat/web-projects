name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build and Test
        run: bun run build && bun run test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: release packages'
          commit: 'chore: release packages'
          version: bun run version-packages
          publish: bunx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @siluat/color-contrast to JSR
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '"name":"@siluat/color-contrast"')
        run: npx jsr publish --allow-dirty
        working-directory: packages/color-contrast

      - name: Resolve workspace deps for CLI JSR publish
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '"name":"@siluat/color-contrast-cli"')
        run: |
          VERSION=$(node -p "require('../color-contrast/package.json').version")
          sed -i "s/\"workspace:\\*\"/\"^$VERSION\"/" package.json
        working-directory: packages/color-contrast-cli

      - name: Publish @siluat/color-contrast-cli to JSR
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '"name":"@siluat/color-contrast-cli"')
        run: npx jsr publish --allow-dirty
        working-directory: packages/color-contrast-cli
