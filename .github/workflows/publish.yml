name: Publish color-contrast-cli (hotfix)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.1)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: packages/color-contrast-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify package.json version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "$EXPECTED_VERSION" ]; then
            echo "::error::package.json version ($pkg_version) does not match input ($EXPECTED_VERSION)"
            exit 1
          fi

      - name: Verify jsr.json version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          jsr_version=$(node -p "require('./jsr.json').version")
          if [ "$jsr_version" != "$EXPECTED_VERSION" ]; then
            echo "::error::jsr.json version ($jsr_version) does not match input ($EXPECTED_VERSION)"
            exit 1
          fi

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Run static checks
        run: bun static-check
        working-directory: .

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    defaults:
      run:
        working-directory: packages/color-contrast-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-jsr:
    name: Publish to JSR
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/color-contrast-cli

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: Resolve workspace deps for JSR
        run: |
          VERSION=$(node -p "require('../color-contrast/package.json').version")
          sed -i "s/\"workspace:\\*\"/\"^$VERSION\"/" package.json

      - name: Publish to JSR
        run: npx jsr publish --allow-dirty

  tag:
    name: Create Git Tag
    needs: [publish-npm, publish-jsr]
    if: always() && (needs.publish-npm.result == 'success' || needs.publish-jsr.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "@siluat/color-contrast-cli@$VERSION"
          git push origin "@siluat/color-contrast-cli@$VERSION"
